<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>履歴 - 週報</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header class="app-header">
    <div style="display:flex; align-items:center; gap:12px;">
      <a href="/index.html" class="btn btn-secondary btn-icon">← 戻る</a>
      <h1>履歴</h1>
    </div>
  </header>

  <main class="main-content">
    <div class="search-area">
      <div class="search-row">
        <span class="search-label">日付で絞り込み:</span>
        <input type="date" id="dateFrom" class="search-date" />
        <span class="search-label">〜</span>
        <input type="date" id="dateTo" class="search-date" />
      </div>
      <div class="search-row">
        <span class="search-label">フリーワード:</span>
        <input type="text" id="searchText" class="search-text" placeholder="キーワードを入力..." />
      </div>
    </div>
    <div id="historyList" class="history-list"></div>
  </main>

  <script type="module" src="/src/history.ts"></script>
</body>
</html>
