<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCG週報</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- ===== メイン画面 ===== -->
  <div id="page-main" class="page">
    <header class="app-header">
      <h1>SCG週報</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" data-navigate="settings">設定</button>
        <button class="btn btn-secondary" data-navigate="history">履歴</button>
      </div>
    </header>
    <main class="main-content">
      <div class="report-date-card" id="reportDateCard">
        <div class="report-date-top">
          <span class="report-date-label">週報の日付<span class="report-date-required">*</span></span>
          <input type="date" id="mainDateInput" class="report-date-input" />
        </div>
        <div id="reportDateDisplay" class="report-date-display">日付を選択してください</div>
      </div>
      <div id="categoryList"></div>
      <div class="main-actions">
        <div class="main-actions-left">
          <button id="resetAllBtn" class="btn btn-danger-outline">すべてリセット</button>
        </div>
        <div class="main-actions-right">
          <button id="copyAllBtn" class="btn btn-secondary">全てコピー</button>
          <button id="saveBtn" class="btn btn-primary">この週報を保存</button>
        </div>
      </div>

      <div class="forms-link-area">
        <a href="https://forms.office.com/pages/responsepage.aspx?id=3WRXFd6MEE2TAOW9Mat1EL7eBshfXElGgTwM8NvHxRlUMVExNVVSRUhBTFFIM005UUw0SFQ5MEIwUyQlQCN0PWcu&route=shorturl" target="_blank" rel="noopener noreferrer" class="btn btn-forms">週報提出画面へ</a>
      </div>
    </main>
  </div>

  <!-- ===== 設定画面 ===== -->
  <div id="page-settings" class="page">
    <header class="app-header">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="btn btn-secondary btn-icon" data-navigate="main">← 戻る</button>
        <h1>設定</h1>
      </div>
      <div class="header-actions">
        <button id="exportBtn" class="btn btn-secondary btn-sm" title="データをエクスポート">↓ 切り出し</button>
        <button id="importBtn" class="btn btn-secondary btn-sm" title="データをインポート">↑ 読み込み</button>
        <input type="file" id="importInput" accept=".json" style="display:none" />
      </div>
    </header>
    <main class="main-content">
      <!-- タブ切り替え -->
      <div class="settings-tabs">
        <button class="settings-tab active" data-settings-tab="email">メールアドレス</button>
        <button class="settings-tab" data-settings-tab="office">事務所</button>
        <button class="settings-tab" data-settings-tab="design">項目の設計</button>
      </div>

      <!-- メールアドレスタブ -->
      <div class="settings-tab-panel active" id="settingsTab-email">
        <p class="tab-hint">メールアドレスを1件ずつ登録します。メイン画面で個別にON/OFFできます。</p>
        <div id="emailListContainer" class="email-master-list"></div>
        <div class="email-add-row">
          <input type="text" id="newEmailInput" class="email-master-input" placeholder="例: yamada-taro" />
          <span class="email-domain-label">@tkc.co.jp</span>
          <button id="addEmailBtn" class="btn btn-primary btn-sm">追加</button>
        </div>
      </div>

      <!-- 事務所タブ -->
      <div class="settings-tab-panel" id="settingsTab-office">
        <p class="tab-hint">登録した事務所名は「会員事務所名」フィールドで入力候補として表示されます。</p>
        <div id="officeListContainer" class="office-master-list"></div>
        <div class="office-add-row">
          <input type="text" id="newOfficeInput" class="office-master-input" placeholder="事務所名を入力" />
          <button id="addOfficeBtn" class="btn btn-primary btn-sm">追加</button>
        </div>
      </div>

      <!-- 項目の設計タブ -->
      <div class="settings-tab-panel" id="settingsTab-design">
        <div id="catList" class="cat-list"></div>
        <button id="addCatBtn" class="btn btn-secondary" style="margin-top:12px;">+ 大項目追加</button>
      </div>
    </main>
    <div class="sticky-footer">
      <button id="saveSettingsBtn" class="btn btn-primary">設定を保存</button>
    </div>
  </div>

  <!-- ===== 履歴画面 ===== -->
  <div id="page-history" class="page">
    <header class="app-header">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="btn btn-secondary btn-icon" data-navigate="main">← 戻る</button>
        <h1>履歴</h1>
      </div>
    </header>
    <main class="main-content">
      <div class="search-area">
        <div class="search-row">
          <span class="search-label">日付選択:</span>
          <select id="dateSelect" class="search-date-select"></select>
        </div>
        <div class="search-row">
          <span class="search-label">日付で絞り込み:</span>
          <input type="date" id="dateFrom" class="search-date" />
          <span class="search-label">〜</span>
          <input type="date" id="dateTo" class="search-date" />
        </div>
        <div class="search-row">
          <span class="search-label">フリーワード:</span>
          <input type="text" id="searchText" class="search-text" placeholder="キーワードを入力..." />
        </div>
        <div class="search-row" style="justify-content: flex-end;">
          <button id="searchBtn" class="btn btn-primary btn-sm">検索</button>
        </div>
      </div>
      <div id="historyList" class="history-list"></div>
    </main>
  </div>

  <!-- ===== 共有: 保存モーダル ===== -->
  <div id="saveModal" class="modal-overlay">
    <div class="modal">
      <h2>週報を保存</h2>
      <p id="saveModalDateText" class="save-modal-date-text"></p>
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn btn-secondary">キャンセル</button>
        <button id="modalSaveBtn" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- ===== 共有: 確認モーダル ===== -->
  <div id="confirmModal" class="modal-overlay">
    <div class="modal">
      <p id="confirmMessage" class="confirm-message"></p>
      <div class="modal-actions">
        <button id="confirmCancelBtn" class="btn btn-secondary">キャンセル</button>
        <button id="confirmOkBtn" class="btn btn-primary">確認</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script type="module" src="/src/app.ts"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
