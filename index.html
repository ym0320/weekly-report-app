<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>週報</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>週報</h1>
    <div class="header-actions">
      <a href="/settings.html" class="btn btn-secondary">設定</a>
      <a href="/history.html" class="btn btn-secondary">履歴</a>
    </div>
  </header>

  <main class="main-content">
    <div class="page-toolbar">
      <button id="resetBtn" class="btn btn-danger">リセット</button>
    </div>
    <div id="categoryList"></div>
    <div class="save-area">
      <button id="saveBtn" class="btn btn-primary">この週報を保存</button>
    </div>
  </main>

  <!-- Save modal -->
  <div id="saveModal" class="modal-overlay">
    <div class="modal">
      <h2>週報を保存</h2>
      <div class="field-group">
        <label class="field-label" for="reportDate">日付</label>
        <input type="date" id="reportDate" class="field-input" />
      </div>
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn btn-secondary">キャンセル</button>
        <button id="modalSaveBtn" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
